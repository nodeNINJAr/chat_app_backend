services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
    healthcheck:
      # Unlike the dev compose, the backend runs inside this same Docker network,
      # so the replica set member must advertise the container hostname, not localhost.
      test: |
        mongosh --quiet --eval "try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0', members:[{_id:0, host:'mongo:27017'}]}).ok }"
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    image: ghcr.io/nodeninjar/chat_app_backend:latest
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - uploads_data:/app/uploads-data
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file: .env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  mongo_data:
  redis_data:
  uploads_data:
  caddy_data:
  caddy_config:
