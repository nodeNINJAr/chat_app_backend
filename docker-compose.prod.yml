services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
    healthcheck:
      # Unlike the dev compose, the backend runs inside this same Docker network,
      # so the replica set member must advertise the container hostname, not localhost.
      test: |
        mongosh --quiet --eval "try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0', members:[{_id:0, host:'mongo:27017'}]}).ok }"
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    image: ghcr.io/nodeninjar/chat_app_backend:latest
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - uploads_data:/app/uploads-data
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started

  coturn:
    image: coturn/coturn:4.6-alpine
    restart: unless-stopped
    # Host networking is required: coturn embeds its own IP in the relay
    # candidates it hands back to clients, and Docker's bridge NAT would make
    # it advertise an internal container IP that's unreachable from the
    # internet, breaking relay for every cross-network call.
    network_mode: host
    env_file: .env.production
    command: >
      sh -c '
        exec turnserver
        --listening-port=3478
        --tls-listening-port=5349
        --min-port=49160
        --max-port=49200
        --realm=$${PUBLIC_HOSTNAME}
        --external-ip=$${TURN_EXTERNAL_IP}
        --use-auth-secret
        --static-auth-secret=$${TURN_SECRET}
        --no-cli
        --no-multicast-peers
        --denied-peer-ip=0.0.0.0-0.255.255.255
        --denied-peer-ip=10.0.0.0-10.255.255.255
        --denied-peer-ip=100.64.0.0-100.127.255.255
        --denied-peer-ip=127.0.0.0-127.255.255.255
        --denied-peer-ip=169.254.0.0-169.254.255.255
        --denied-peer-ip=172.16.0.0-172.31.255.255
        --denied-peer-ip=192.0.0.0-192.0.0.255
        --denied-peer-ip=192.168.0.0-192.168.255.255
        --denied-peer-ip=198.18.0.0-198.19.255.255
        --log-file=stdout
      '

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file: .env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  mongo_data:
  redis_data:
  uploads_data:
  caddy_data:
  caddy_config:
